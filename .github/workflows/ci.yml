name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Submodules are not initialized here — the SSH URL in .gitmodules
          # requires a key that isn't available in CI.  make vendor rewrites
          # git@github.com: → https://github.com/ when CI=true, then inits.
          submodules: false

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Init submodules
        run: make vendor

      - name: Install dependencies
        run: npm ci
